<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Study Hub | Class 8-12 Physics, Chemistry, Maths</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f0ff 0%, #f5f7fc 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header {
            background: linear-gradient(145deg, #0a2f44, #0b4f6c);
            color: white;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }
        header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
        header p { opacity: 0.9; font-size: 1rem; }
        .class-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            background: #f4f9fe;
            padding: 1.2rem;
            border-bottom: 1px solid #cde3f0;
        }
        .class-btn {
            background: white;
            border: none;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            color: #0a2f44;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .class-btn.active {
            background: #0b4f6c;
            color: white;
        }
        .class-btn:hover {
            background: #f4a261;
            color: #1e2a3e;
        }
        .subjects-panel {
            padding: 2rem;
            min-height: 400px;
        }
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .subject-card {
            background: #fefcf5;
            border-radius: 28px;
            padding: 1.5rem;
            text-align: center;
            text-decoration: none;
            color: #1e2a3e;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e2edf2;
            display: block;
        }
        .subject-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
            border-color: #f4a261;
        }
        .subject-icon {
            font-size: 3.5rem;
            margin-bottom: 0.8rem;
        }
        .subject-card h3 {
            color: #0b4f6c;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .subject-card p {
            font-size: 0.9rem;
            color: #4a627a;
        }
        .coming-soon {
            opacity: 0.6;
            pointer-events: none;
            background: #f0f0f0;
        }
        .coming-soon .subject-card {
            cursor: default;
        }
        .coming-badge {
            display: inline-block;
            background: #f4a261;
            color: white;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 20px;
            margin-top: 8px;
        }
        footer {
            background: #0a2f44;
            color: #cddfe7;
            text-align: center;
            padding: 1rem;
            font-size: 0.85rem;
        }
        @media (max-width: 700px) {
            .subjects-grid { grid-template-columns: 1fr; }
            .class-btn { padding: 6px 16px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📚 CBSE Study Hub</h1>
        <p>Complete study material for Physics, Chemistry & Mathematics | Classes 8 to 12</p>
    </header>

    <div class="class-selector" id="classSelector">
        <button class="class-btn" data-class="8">Class 8</button>
        <button class="class-btn" data-class="9">Class 9</button>
        <button class="class-btn" data-class="10">Class 10</button>
        <button class="class-btn" data-class="11">Class 11</button>
        <button class="class-btn" data-class="12">Class 12</button>
    </div>

    <div class="subjects-panel" id="subjectsPanel"></div>

    <footer>© 2025 CBSE Study Hub | All study material with interactive tools | More classes coming soon</footer>
</div>

<script>
    const subjectData = {
        8: {
            physics: { name: "Physics", icon: "⚛️", file: "physics.html", description: "Force, Friction, Sound, Chemical Effects, Natural Phenomena + 25 tools" },
            chemistry: { name: "Chemistry", icon: "🧪", file: "chemistry.html", description: "Coal & Petroleum, Combustion, Pollution, Metals & Non-Metals + 25 tools" },
            maths: { name: "Mathematics", icon: "📐", file: "maths.html", description: "Rational Numbers, Algebra, Mensuration, Data Handling + 65 tools" }
        },
        9: {
            physics: { name: "Physics", icon: "⚛️", file: "physics-9.html", description: "Motion, Force, Gravitation, Work & Energy, Sound + 25 tools" },
            chemistry: { name: "Chemistry", icon: "🧪", file: "chemistry-9.html", description: "Matter, Atoms, Molecules, Structure of Atom + 20 tools" },
            maths: { name: "Mathematics", icon: "📐", file: "maths-9.html", description: "Number Systems, Polynomials, Geometry, Mensuration, Statistics + 65 tools" }
        },
        10: {
            physics: { name: "Physics", icon: "⚛️", file: "#", description: "Coming soon", coming: true },
            chemistry: { name: "Chemistry", icon: "🧪", file: "#", description: "Coming soon", coming: true },
            maths: { name: "Mathematics", icon: "📐", file: "#", description: "Coming soon", coming: true }
        },
        11: {
            physics: { name: "Physics", icon: "⚛️", file: "#", description: "Coming soon", coming: true },
            chemistry: { name: "Chemistry", icon: "🧪", file: "#", description: "Coming soon", coming: true },
            maths: { name: "Mathematics", icon: "📐", file: "#", description: "Coming soon", coming: true }
        },
        12: {
            physics: { name: "Physics", icon: "⚛️", file: "#", description: "Coming soon", coming: true },
            chemistry: { name: "Chemistry", icon: "🧪", file: "#", description: "Coming soon", coming: true },
            maths: { name: "Mathematics", icon: "📐", file: "#", description: "Coming soon", coming: true }
        }
    };
    const subjectOrder = ['physics', 'chemistry', 'maths'];
    const classBtns = document.querySelectorAll('.class-btn');
    const subjectsPanel = document.getElementById('subjectsPanel');

    function renderSubjects(className) {
        const data = subjectData[className];
        if (!data) {
            subjectsPanel.innerHTML = '<div style="text-align: center; padding: 2rem;">No subjects available for this class yet.</div>';
            return;
        }
        let html = `<h2 style="color: #0a2f44; margin-bottom: 1rem;">Class ${className} - Subjects</h2><div class="subjects-grid">`;
        for (let sub of subjectOrder) {
            const subject = data[sub];
            if (subject) {
                const isComing = subject.coming === true;
                const cardClass = isComing ? 'subject-card coming-soon' : 'subject-card';
                const link = isComing ? '#' : subject.file;
                html += `
                    <a href="${link}" class="${cardClass}">
                        <div class="subject-icon">${subject.icon}</div>
                        <h3>${subject.name}</h3>
                        <p>${subject.description}</p>
                        ${isComing ? '<div class="coming-badge">Coming Soon</div>' : ''}
                    </a>
                `;
            }
        }
        html += `</div>`;
        subjectsPanel.innerHTML = html;
    }

    function setActiveClass(className) {
        classBtns.forEach(btn => {
            if (btn.getAttribute('data-class') == className) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderSubjects(className);
    }

    classBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const cls = parseInt(btn.getAttribute('data-class'));
            setActiveClass(cls);
        });
    });
    setActiveClass(8);
</script>
</body>
</html>
